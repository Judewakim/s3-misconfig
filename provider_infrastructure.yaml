AWSTemplateFormatVersion: "2010-09-09"
Description: >
  S3 Sentry Provider Infrastructure — deploys all provider-account resources:
  ECR repository, IAM execution role, SNS alert topic, Lambda function, and
  the EventBridge scheduled rule. Deploy this stack once in the provider account
  before pushing the container image.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  OrchestratorImageUri:
    Type: String
    Description: >
      ECR image URI for the S3 Sentry orchestrator container.
      Format: <account>.dkr.ecr.<region>.amazonaws.com/s3sentry-orchestrator:latest
      Leave as placeholder on first deploy; update after the initial ECR push.
    Default: "PLACEHOLDER — push image to ECR and update-function-code"

  DynamoDBTableName:
    Type: String
    Default: "S3Sentry"
    Description: "Name of the existing S3 Sentry DynamoDB single table."

  ScanSchedule:
    Type: String
    Default: "cron(0 2 * * ? *)"
    Description: "EventBridge schedule expression. Default: daily at 02:00 UTC."

  LambdaMemoryMB:
    Type: Number
    Default: 1024
    Description: "Lambda memory allocation in MB. Prowler loads large provider objects; 1024 minimum recommended."

  LambdaTimeoutSeconds:
    Type: Number
    Default: 900
    Description: "Lambda timeout in seconds. 900 = Lambda maximum (15 min)."

  VaultBucketName:
    Type: String
    Default: "s3sentry-vault"
    Description: "Provider-account S3 bucket for Safety Engine config snapshots before remediation."

  SESFromAddress:
    Type: String
    Default: "alerts@yourdomain.com"
    Description: "SES-verified sender address for dashboard emails. Must be verified in SES before use."

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # # -------------------------------------------------------------------------
  # # 1. ECR Repository
  # # -------------------------------------------------------------------------
  # OrchestratorECRRepo:
  #   Type: AWS::ECR::Repository
  #   Properties:
  #     RepositoryName: s3sentry-orchestrator
  #     ImageScanningConfiguration:
  #       ScanOnPush: true
  #     LifecyclePolicy:
  #       LifecyclePolicyText: |
  #         {
  #           "rules": [
  #             {
  #               "rulePriority": 1,
  #               "description": "Keep last 5 images to control ECR storage costs",
  #               "selection": {
  #                 "tagStatus": "any",
  #                 "countType": "imageCountMoreThan",
  #                 "countNumber": 5
  #               },
  #               "action": { "type": "expire" }
  #             }
  #           ]
  #         }

  # -------------------------------------------------------------------------
  # 2. SNS Topic — scan-complete alerts
  # -------------------------------------------------------------------------
  ScanAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: S3SentryScanAlerts
      DisplayName: "S3 Sentry Scan Alerts"

  # -------------------------------------------------------------------------
  # 3. IAM Execution Role — S3SentryOrchestratorRole
  #    Trust: Lambda service only.
  #    Principle of least privilege: scoped to S3Sentry table, cross-account
  #    role names, and the SNS topic created in this stack.
  # -------------------------------------------------------------------------
  OrchestratorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: S3SentryOrchestratorRole
      Description: "Execution role for the S3 Sentry Lambda orchestrator."
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole

      Policies:
        # --- CloudWatch Logs (standard Lambda logging) ---
        - PolicyName: S3SentryLambdaLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/S3SentryOrchestrator:*"

        # --- DynamoDB — tenant discovery and findings persistence ---
        - PolicyName: S3SentryDynamoDB
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: TableAccess
                Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:PutItem
                  - dynamodb:BatchWriteItem
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDBTableName}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDBTableName}/index/*"

        # --- STS — assume the cross-account role in each client account ---
        - PolicyName: S3SentryCrossAccountAssume
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AssumeClientRole
                Effect: Allow
                Action: sts:AssumeRole
                # Scoped to only the specific role name deployed by client_onboarding.yaml.
                Resource: "arn:aws:iam::*:role/S3SentryCrossAccountRole"

        # --- SNS — publish scan-complete summaries ---
        - PolicyName: S3SentrySNSPublish
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: PublishScanAlerts
                Effect: Allow
                Action: sns:Publish
                Resource: !Ref ScanAlertsTopic

        # --- SES — send HTML dashboard emails to tenants ---
        - PolicyName: S3SentrySES
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"

        # --- SSM — read HMAC signing key shared with Responder Lambda ---
        - PolicyName: S3SentrySSMRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/s3sentry/*"

        # # --- ECR — pull the container image on cold start ---
        # - PolicyName: S3SentryECRPull
        #   PolicyDocument:
        #     Version: "2012-10-17"
        #     Statement:
        #       - Sid: ECRAuth
        #         Effect: Allow
        #         Action: ecr:GetAuthorizationToken
        #         Resource: "*"
        #       - Sid: ECRImagePull
        #         Effect: Allow
        #         Action:
        #           - ecr:BatchGetImage
        #           - ecr:GetDownloadUrlForLayer
        #         Resource: !GetAtt OrchestratorECRRepo.Arn

  # -------------------------------------------------------------------------
  # 4. Lambda Function
  # -------------------------------------------------------------------------
  OrchestratorFunction:
    Type: AWS::Lambda::Function
    DependsOn: OrchestratorRole
    Properties:
      FunctionName: S3SentryOrchestrator
      Description: "Scans all S3 Sentry tenants on a schedule using Prowler."
      PackageType: Image
      Code:
        ImageUri: !Ref OrchestratorImageUri
      Role: !GetAtt OrchestratorRole.Arn
      Timeout: !Ref LambdaTimeoutSeconds
      MemorySize: !Ref LambdaMemoryMB
      Environment:
        Variables:
          DYNAMODB_TABLE:   !Ref DynamoDBTableName
          SNS_TOPIC_ARN:    !Ref ScanAlertsTopic
          SES_FROM_ADDRESS: !Ref SESFromAddress
          HMAC_KEY_PATH:    "/s3sentry/hmac_signing_key"
          # RESPONDER_URL is injected after stack creation via a stack update,
          # because the URL is only known once the ResponderFunctionUrl resource exists.
          # Initial deploy: leave blank. After first deploy, run:
          #   aws cloudformation update-stack ... --parameters ParameterKey=ResponderUrl,...
          RESPONDER_URL:    ""
      # Ephemeral storage default is 512MB; Prowler JSON output per scan < 1MB.
      EphemeralStorage:
        Size: 512

  OrchestratorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${OrchestratorFunction}"
      RetentionInDays: 7

  # -------------------------------------------------------------------------
  # 5. EventBridge Scheduled Rule — daily trigger
  # -------------------------------------------------------------------------
  ScanScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: S3SentryDailyScan
      Description: "Triggers the S3 Sentry orchestrator on the configured schedule."
      ScheduleExpression: !Ref ScanSchedule
      State: ENABLED
      Targets:
        - Id: S3SentryOrchestratorTarget
          Arn: !GetAtt OrchestratorFunction.Arn
          Input: "{}"

  # Permission for EventBridge to invoke the Lambda function.
  ScanSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt OrchestratorFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ScanScheduleRule.Arn

  # -------------------------------------------------------------------------
  # 6. SSM Parameter — managed by deploy.ps1, NOT by CloudFormation.
  #    CloudFormation cannot create SecureString parameters. deploy.ps1 Step 1
  #    seeds /s3sentry/hmac_signing_key as a SecureString before this stack
  #    is deployed. Keeping it in CFN would cause a conflict (CFN overwrites
  #    the real SecureString key with a plain String "CHANGE_ME" placeholder).
  # -------------------------------------------------------------------------
  # HMACSigningKey: (removed — owned by deploy.ps1)

  # -------------------------------------------------------------------------
  # 7. IAM Role — S3SentryResponderRole
  #    Used by the Responder Lambda only. Scoped to the minimum permissions
  #    required to validate tokens, execute fixes, and write audit events.
  # -------------------------------------------------------------------------
  ResponderRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: S3SentryResponderRole
      Description: "Execution role for the S3 Sentry Responder Lambda (action handler)."
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole

      Policies:
        # --- CloudWatch Logs ---
        - PolicyName: ResponderLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/S3SentryResponder:*"

        # --- DynamoDB — token validation, suppression writes, audit events ---
        - PolicyName: ResponderDynamoDB
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDBTableName}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDBTableName}/index/*"

        # --- STS — assume cross-account role to execute fixes ---
        - PolicyName: ResponderCrossAccountAssume
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sts:AssumeRole
                Resource: "arn:aws:iam::*:role/S3SentryCrossAccountRole"

        # --- SSM — read the same HMAC signing key as the Orchestrator ---
        - PolicyName: ResponderSSMRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/s3sentry/*"

        # --- S3 Vault — read snapshots for rollback; write before-state for new fixes ---
        - PolicyName: ResponderVaultAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "arn:aws:s3:::${VaultBucketName}/*"

  # -------------------------------------------------------------------------
  # 8. Responder Lambda — ZIP-based Python (no Prowler dependency)
  #    Placeholder inline code allows the stack to deploy before responder.py
  #    is written. Replace via: aws lambda update-function-code --zip-file
  # -------------------------------------------------------------------------
  ResponderFunction:
    Type: AWS::Lambda::Function
    DependsOn: ResponderRole
    Properties:
      FunctionName: S3SentryResponder
      Description: "Handles action button clicks from S3 Sentry dashboard emails (FIX / IGNORE / ROLLBACK)."
      Runtime: python3.11
      Handler: responder.handler
      Role: !GetAtt ResponderRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref DynamoDBTableName
          HMAC_KEY_PATH:  "/s3sentry/hmac_signing_key"
          VAULT_BUCKET:   !Ref VaultBucketName
      Code:
        ZipFile: |
          # Placeholder — deploy responder.py via update-function-code
          import json
          def handler(event, context):
              return {
                  "statusCode": 200,
                  "headers": {"Content-Type": "text/html"},
                  "body": "<h2>S3 Sentry Responder</h2><p>Deployment pending.</p>"
              }

  ResponderLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ResponderFunction}"
      RetentionInDays: 7

  # -------------------------------------------------------------------------
  # 9. Lambda Function URL — managed by deploy.ps1, NOT by CloudFormation.
  #    AWS::Lambda::Url consistently creates a ghost resource: CFN reports
  #    success and returns a URL string, but the URL is never attached to the
  #    Lambda function (console shows nothing; requests return 403 Forbidden).
  #    deploy.ps1 uses aws lambda create-function-url-config + add-permission
  #    directly, which is reliable. The URL is then read via
  #    get-function-url-config and injected into the Orchestrator env var.
  # -------------------------------------------------------------------------
  # ResponderFunctionUrl:    (removed — owned by deploy.ps1)
  # ResponderFunctionUrlPermission: (removed — owned by deploy.ps1)

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  # ECRRepositoryUri:
  #   Description: "Push your container image to this URI, then update the Lambda function."
  #   Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/s3sentry-orchestrator"

  OrchestratorRoleArn:
    Description: >
      ARN of S3SentryOrchestratorRole. Use this to tighten the trust policy
      Principal in client_onboarding.yaml once this stack is deployed.
    Value: !GetAtt OrchestratorRole.Arn

  SNSTopicArn:
    Description: "Subscribe an email address to this topic to receive scan alerts."
    Value: !Ref ScanAlertsTopic

  LambdaFunctionName:
    Description: "Lambda function name for use with update-function-code after each image push."
    Value: !Ref OrchestratorFunction

  DeployInstructions:
    Description: "Run these commands after stack creation to push the image and activate the function."
    Value: !Sub |
      1. aws ecr get-login-password --region ${AWS::Region} | docker login --username AWS --password-stdin ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com
      2. docker build --platform linux/amd64 -t s3sentry-orchestrator .
      3. docker tag s3sentry-orchestrator:latest ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/s3sentry-orchestrator:latest
      4. docker push ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/s3sentry-orchestrator:latest
      5. aws lambda update-function-code --function-name S3SentryOrchestrator --image-uri ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/s3sentry-orchestrator:latest
